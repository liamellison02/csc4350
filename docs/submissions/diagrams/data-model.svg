  <rect x="0" y="0" width="1240" height="900" fill="#ffffff"/>
  <text x="620" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Helmsman - Data Model (Entity-Relationship Diagram)</text>
  <text x="620" y="58" text-anchor="middle" font-size="13" fill="#64748b">PostgreSQL schema - Team LOKK (Group 14)</text>
  <g>
