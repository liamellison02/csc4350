    <path d="M712,470 L810,470 L810,604 L902,604" fill="none" stroke="#475569" stroke-width="1.7" marker-start="url(#one)" marker-end="url(#zmany)"/>
    <rect x="755" y="450" width="87" height="17" rx="3" fill="#ffffff" opacity="0.92"/>
    <text x="760" y="462" font-size="11.5" font-style="italic" fill="#0f172a">deployed via</text>
    <path d="M1066,270 L1066,560" fill="none" stroke="#475569" stroke-width="1.7" marker-start="url(#one)" marker-end="url(#zmany)"/>
    <rect x="1069" y="398" width="80" height="17" rx="3" fill="#ffffff" opacity="0.92"/>
    <text x="1074" y="410" font-size="11.5" font-style="italic" fill="#0f172a">targeted by</text>
