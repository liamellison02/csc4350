<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="520" fill="#f7f8fa"/>

  <!-- title -->
  <text x="32" y="38" font-size="20" font-weight="700" fill="#1f2430">Login screen</text>
  <text x="32" y="58" font-size="13" fill="#6b7280">Helmsman - unauthenticated entry point (route: /login)</text>

  <!-- app viewport frame -->
  <rect x="32" y="76" width="440" height="412" rx="8" fill="#eef1f5" stroke="#c4c9d4"/>
  <rect x="32" y="76" width="440" height="28" rx="8" fill="#e2e6ec" stroke="#c4c9d4"/>
  <circle cx="48" cy="90" r="4" fill="#c4c9d4"/>
  <circle cx="62" cy="90" r="4" fill="#c4c9d4"/>
  <circle cx="76" cy="90" r="4" fill="#c4c9d4"/>

  <!-- centered auth card -->
  <rect x="112" y="150" width="280" height="292" rx="10" fill="#ffffff" stroke="#c4c9d4"/>

  <text x="252" y="192" font-size="22" font-weight="700" fill="#1f2430" text-anchor="middle">Helmsman</text>
  <text x="252" y="214" font-size="12" fill="#6b7280" text-anchor="middle">sign in to the control plane</text>

  <!-- error banner (conditional) -->
  <rect x="132" y="228" width="240" height="30" rx="5" fill="#fdecec" stroke="#e5484d" stroke-dasharray="4 3"/>
  <text x="252" y="247" font-size="11" fill="#b42318" text-anchor="middle">invalid email or password</text>

  <!-- email field -->
  <text x="132" y="284" font-size="12" fill="#374151">email</text>
  <rect x="132" y="292" width="240" height="32" rx="5" fill="#ffffff" stroke="#9aa2b1"/>
  <text x="144" y="312" font-size="12" fill="#9aa2b1">operator@helmsman.local</text>

  <!-- password field -->
  <text x="132" y="346" font-size="12" fill="#374151">password</text>
  <rect x="132" y="354" width="240" height="32" rx="5" fill="#ffffff" stroke="#9aa2b1"/>
  <text x="144" y="374" font-size="12" fill="#9aa2b1">••••••••••</text>

  <!-- submit -->
  <rect x="132" y="400" width="240" height="34" rx="6" fill="#1f2430"/>
  <text x="252" y="422" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">sign in</text>

  <!-- annotations -->
  <g stroke="#2563eb" stroke-dasharray="4 3">
    <line x1="372" y1="243" x2="520" y2="180"/>
    <line x1="372" y1="417" x2="520" y2="330"/>
    <line x1="392" y1="296" x2="520" y2="430"/>
  </g>
  <g fill="#2563eb" font-size="12">
    <circle cx="520" cy="180" r="3"/>
    <text x="532" y="168" font-weight="700">Error banner</text>
    <text x="532" y="186" fill="#374151">role="alert"; shown only after a</text>
    <text x="532" y="202" fill="#374151">failed sign-in, cleared on retry.</text>

    <circle cx="520" cy="330" r="3"/>
    <text x="532" y="318" font-weight="700">Submit button</text>
    <text x="532" y="336" fill="#374151">reads "signing in..." and is</text>
    <text x="532" y="352" fill="#374151">disabled while the call is pending.</text>

    <circle cx="520" cy="430" r="3"/>
    <text x="532" y="418" font-weight="700">Already signed in?</text>
    <text x="532" y="436" fill="#374151">a live token redirects the user</text>
    <text x="532" y="452" fill="#374151">straight to the dashboard (/).</text>
  </g>
</svg>
